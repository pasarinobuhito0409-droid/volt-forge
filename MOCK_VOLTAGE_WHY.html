<!DOCTYPE html>
<html lang="ja"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>VOLT L2「なぜ押すの？」3Dテスト版</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  body { background:#0f1216; color:#e2e7ee; font-family:system-ui,sans-serif; padding:12px 12px 60px; }
  .wrap { max-width:520px; margin:0 auto; }
  h2 { font-size:13.5px; color:#8b93a0; letter-spacing:.12em; margin:20px 2px 8px; border-left:3px solid #ffd64f; padding-left:8px; }
  .note { font-size:12px; color:#8a93a0; line-height:1.9; margin:4px 2px 8px; }
  .stage3d { position:relative; height:46vh; min-height:310px; border-radius:16px; overflow:hidden; background:radial-gradient(130% 110% at 50% 0%, #1c2030 0%, #0f1216 70%); border:1px solid #2c3244; touch-action:none; }
  .chip { position:absolute; z-index:4; pointer-events:none; padding:5px 12px; border-radius:8px; font-size:12.5px; font-weight:800; color:#eef4f6; background:rgba(10,12,16,0.85); border:1.5px solid rgba(220,230,235,0.65); }
  .big { position:absolute; left:50%; top:10px; transform:translateX(-50%); font-size:14px; font-weight:900; color:#ffe9a3; background:#151a21ee; border:1px solid #ffd964; padding:7px 14px; border-radius:12px; z-index:4; white-space:nowrap; }
  .btnrow { display:flex; gap:8px; margin-top:10px; }
  .cta { flex:1; padding:13px 8px; border-radius:12px; border:none; font-weight:900; font-size:13px; cursor:pointer; background:#ffd64f; color:#231a02; box-shadow:0 0 16px #ffd64f44; }
  .cta.alt { background:#232b36; color:#c9d4e2; border:1px solid #37424f; box-shadow:none; }
  .sliderrow { display:flex; align-items:center; gap:10px; margin-top:10px; font-size:12px; color:#8b93a0; }
  .sliderrow input { flex:1; }
  .val { font-weight:900; color:#ffe9a3; min-width:88px; text-align:right; font-size:13px; }
</style></head><body>
<div class="wrap">

  <h2>⚡ L2新カード「なぜ押すの？」── 満員電車の3D</h2>
  <div class="note">
    左の部屋＝<b>マイナス極</b>（電子ぎゅうぎゅう）。<br>
    右の部屋＝<b>プラス極</b>（ガラガラ）。<br>
    電子は<b>反発し合って</b>ゲートを押してる。<br><br>
    ①スライダーで<b>詰め込み具合</b>を変える<br>
    ②<b>スイッチON</b>でゲートが開く——なだれ込み＋ランプ点灯<br>
    ③差がなくなると流れが止まる＝<b>電池切れの正体</b>
  </div>
  <div class="stage3d" id="stage">
    <div class="big" id="bigTxt">電圧＝混み具合の差</div>
    <span class="chip" style="left:4%; bottom:12px">−極：満員（押し合い）</span>
    <span class="chip" style="right:4%; bottom:12px">＋極：ガラガラ</span>
  </div>
  <div class="sliderrow">
    <span>詰め込み具合（＝電圧）</span>
    <input type="range" id="packSl" min="0" max="100" value="60">
    <span class="val" id="packVal">3.0V</span>
  </div>
  <div class="btnrow">
    <button class="cta" id="btnGate">🔘 スイッチON（ゲートを開く）</button>
    <button class="cta alt" id="btnReset">↺ 充電しなおす</button>
  </div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
"use strict";
(function(){
  const holder=document.getElementById("stage");
  const W=()=>Math.max(2,holder.clientWidth), H=()=>Math.max(2,holder.clientHeight);
  const renderer=new THREE.WebGLRenderer({antialias:true,alpha:true});
  renderer.setPixelRatio(Math.min(3,devicePixelRatio)); renderer.setSize(W(),H());
  holder.appendChild(renderer.domElement);
  const scene=new THREE.Scene();
  const cam=new THREE.PerspectiveCamera(42,W()/H(),0.1,100);
  cam.position.set(0,1.6,7.4); cam.lookAt(0,-0.1,0);
  scene.add(new THREE.AmbientLight(0xffffff,0.85));
  const dl=new THREE.DirectionalLight(0xfff2d8,0.8); dl.position.set(3,6,4); scene.add(dl);
  const rim=new THREE.DirectionalLight(0xffd64f,0.6); rim.position.set(-4,2,-3); scene.add(rim);

  /* 電池の断面＝2部屋（ガラス箱）＋中央ゲート */
  function room(x,label){
    const g=new THREE.Mesh(new THREE.BoxGeometry(2.5,2.0,1.3),
      new THREE.MeshStandardMaterial({color:0x2a3140,transparent:true,opacity:0.28,roughness:0.2,metalness:0.1}));
    g.position.set(x,0,0); scene.add(g);
    const edge=new THREE.LineSegments(new THREE.EdgesGeometry(g.geometry), new THREE.LineBasicMaterial({color:0x5a6a86}));
    edge.position.copy(g.position); scene.add(edge);
    return g;
  }
  room(-1.5); room(1.5);
  // 極板の色: −は青板、＋は赤板
  const minusPlate=new THREE.Mesh(new THREE.BoxGeometry(0.12,1.8,1.1), new THREE.MeshStandardMaterial({color:0x3f77ff,emissive:0x11276b,emissiveIntensity:0.7}));
  minusPlate.position.set(-2.65,0,0); scene.add(minusPlate);
  const plusPlate=new THREE.Mesh(new THREE.BoxGeometry(0.12,1.8,1.1), new THREE.MeshStandardMaterial({color:0xff6a4d,emissive:0x6b1a0d,emissiveIntensity:0.7}));
  plusPlate.position.set(2.65,0,0); scene.add(plusPlate);
  // 中央ゲート
  const gate=new THREE.Mesh(new THREE.BoxGeometry(0.1,2.0,1.3), new THREE.MeshStandardMaterial({color:0x8892a4,metalness:0.7,roughness:0.4}));
  gate.position.set(0,0,0); scene.add(gate);

  // 上の導線ループ＋ランプ（ゲートONで電子はここを通る絵にする＝回路感）
  const wirePts=[new THREE.Vector3(-1.5,1.1,0), new THREE.Vector3(-1.5,2.2,0), new THREE.Vector3(1.5,2.2,0), new THREE.Vector3(1.5,1.1,0)];
  const wire=new THREE.Mesh(new THREE.TubeGeometry(new THREE.CatmullRomCurve3(wirePts),40,0.05,8,false),
    new THREE.MeshStandardMaterial({color:0xb87333,metalness:0.8,roughness:0.35}));
  scene.add(wire);
  const lampMat=new THREE.MeshStandardMaterial({color:0x3a3325,emissive:0x000000});
  const lamp=new THREE.Mesh(new THREE.SphereGeometry(0.3,20,16), lampMat);
  lamp.position.set(0,2.2,0); scene.add(lamp);

  /* 電子たち */
  const eGeo=new THREE.SphereGeometry(0.09,10,8);
  const eMat=new THREE.MeshStandardMaterial({color:0x7fd0ff,emissive:0x1a4d70,emissiveIntensity:0.9});
  const N=46;
  const els=[];
  for(let i=0;i<N;i++){
    const m=new THREE.Mesh(eGeo,eMat);
    scene.add(m);
    els.push({m, side:-1, x:0,y:0,z:0, vx:0,vy:0,vz:0, onWire:false, wt:0});
  }
  let pack=0.6, gateOpen=false, drained=false;
  function leftCount(){ return Math.round(10 + pack*34); } // 詰め込み数
  function reset(){
    gateOpen=false; drained=false;
    gate.position.y=0;
    const nl=leftCount();
    els.forEach((e,i)=>{
      e.onWire=false;
      e.side = i<nl ? -1 : 1;
      const bx = e.side<0 ? -1.5 : 1.5;
      const spread = e.side<0 ? 1.05 : 1.1;
      e.x=bx+(Math.random()-0.5)*spread*2*(e.side<0? Math.min(1,0.4+ (1-pack)*0.8):1);
      e.y=(Math.random()-0.5)*1.7; e.z=(Math.random()-0.5)*1.0;
      e.vx=(Math.random()-0.5)*0.6; e.vy=(Math.random()-0.5)*0.6; e.vz=(Math.random()-0.5)*0.4;
    });
    lampMat.emissive.setHex(0x000000); lampMat.color.setHex(0x3a3325);
    document.getElementById("bigTxt").textContent="電圧＝混み具合の差";
  }
  reset();

  document.getElementById("packSl").addEventListener("input",function(){
    pack=+this.value/100;
    document.getElementById("packVal").textContent=(pack*5).toFixed(1)+"V";
    if(!gateOpen) reset();
  });
  document.getElementById("btnGate").addEventListener("click",()=>{
    gateOpen=true;
    document.getElementById("bigTxt").textContent="なだれ込み中——後ろが押し、前が引く";
    if(navigator.vibrate)try{navigator.vibrate(20)}catch(e){}
  });
  document.getElementById("btnReset").addEventListener("click",reset);

  let t=0, moved=0;
  (function anim(){
    t+=0.016;
    const nl=els.filter(e=>e.side<0&&!e.onWire).length;
    const nr=els.filter(e=>e.side>0&&!e.onWire).length;
    const diff=Math.max(0,nl-nr);
    // ゲート開閉表現
    gate.position.y += ((gateOpen? 2.6:0) - gate.position.y)*0.12;

    els.forEach(e=>{
      if(e.onWire){
        // 導線ルートを進む（左上→右上→右へ落ちる）
        e.wt+=0.012*(0.5+diff/20);
        if(e.wt>=1){ e.onWire=false; e.side=1; e.x=1.5+(Math.random()-0.5)*1.6; e.y=0.6; e.z=(Math.random()-0.5)*0.9; e.vx=0; e.vy=-0.5; }
        else {
          const p=new THREE.CatmullRomCurve3(wirePts).getPoint(e.wt);
          e.x=p.x; e.y=p.y+ (Math.random()-0.5)*0.02; e.z=p.z;
        }
      } else {
        const crowd = e.side<0 ? pack : 0.1;
        // 反発（近い電子同士を離す）＝押し合いの見え化
        els.forEach(o=>{
          if(o===e||o.onWire||o.side!==e.side)return;
          const dx=e.x-o.x, dy=e.y-o.y, dz=e.z-o.z;
          const d2=dx*dx+dy*dy+dz*dz;
          if(d2<0.16&&d2>0.0001){ const f=0.018/(d2+0.02); e.vx+=dx*f; e.vy+=dy*f; e.vz+=dz*f; }
        });
        // 揺れ＋壁
        e.vx+=(Math.random()-0.5)*0.05*(0.4+crowd); e.vy+=(Math.random()-0.5)*0.05; e.vz+=(Math.random()-0.5)*0.03;
        e.vx*=0.92; e.vy*=0.92; e.vz*=0.92;
        e.x+=e.vx*0.05; e.y+=e.vy*0.05; e.z+=e.vz*0.05;
        const cx = e.side<0? -1.5:1.5;
        const half = 1.13;
        if(e.x<cx-half){e.x=cx-half;e.vx=Math.abs(e.vx);}
        // 中央側の壁: ゲート閉なら跳ね返る／開なら−側の一番前が導線へ
        if(e.side<0){
          if(e.x>cx+half){
            if(gateOpen && diff>2 && Math.random()<0.5){ e.onWire=true; e.wt=0; moved++; }
            else { e.x=cx+half; e.vx=-Math.abs(e.vx)*(1+pack); }
          }
        } else {
          if(e.x>cx+half){e.x=cx+half;e.vx=-Math.abs(e.vx);}
          if(e.x<cx-half){e.x=cx-half;e.vx=Math.abs(e.vx);}
        }
        if(e.y>0.95){e.y=0.95;e.vy=-Math.abs(e.vy);} if(e.y<-0.95){e.y=-0.95;e.vy=Math.abs(e.vy);}
        if(e.z>0.6){e.z=0.6;e.vz=-Math.abs(e.vz);} if(e.z<-0.6){e.z=-0.6;e.vz=Math.abs(e.vz);}
      }
      e.m.position.set(e.x,e.y,e.z);
    });

    // ランプ＝流れの量で点灯
    const flow=els.filter(e=>e.onWire).length;
    const lum=Math.min(1,flow/6);
    lampMat.emissive.setRGB(lum, lum*0.75, lum*0.2);
    lampMat.color.setRGB(0.23+lum*0.7, 0.2+lum*0.55, 0.15+lum*0.1);

    if(gateOpen && diff<=2 && !drained){
      drained=true;
      document.getElementById("bigTxt").textContent="差がゼロ＝流れ停止（電池切れの正体）";
    }
    cam.position.x=Math.sin(t*0.25)*0.4; cam.lookAt(0,0.3,0);
    renderer.render(scene,cam);
    requestAnimationFrame(anim);
  })();
  addEventListener("resize",()=>{ renderer.setSize(W(),H()); cam.aspect=W()/H(); cam.updateProjectionMatrix(); });
})();
</script>
</body></html>
